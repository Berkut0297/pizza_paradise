<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="text-3xl font-bold text-center text-red-700 mb-8">Menü</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">

    <!-- PIZZA KÁRTYA PÉLDA -->
    <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-xl transition">
      <img src="../media/image/margherita.jpg" alt="Margherita" class="w-full h-48 object-cover">
      <div class="p-4">
        <h2 class="text-xl font-semibold mb-2">Margherita</h2>
        <p class="text-gray-600 mb-4">Paradicsomszósz, mozzarella sajt, friss bazsalikom.</p>
        <div class="flex justify-between items-center">
          <span class="text-red-700 font-bold text-lg">1 500 Ft</span>
          <button class="bg-red-700 text-white px-3 py-1 rounded hover:bg-red-800 transition">
            Rendelés
          </button>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-xl transition">
      <img src="../media/image/pepperoni.jpg" alt="Pepperoni" class="w-full h-48 object-cover">
      <div class="p-4">
        <h2 class="text-xl font-semibold mb-2">Pepperoni</h2>
        <p class="text-gray-600 mb-4">Paradicsomszósz, mozzarella, pepperoni szeletek.</p>
        <div class="flex justify-between items-center">
          <span class="text-red-700 font-bold text-lg">1 800 Ft</span>
          <button class="bg-red-700 text-white px-3 py-1 rounded hover:bg-red-800 transition">
            Rendelés
          </button>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-xl transition">
      <img src="../media/image/funghi.jpg" alt="Funghi" class="w-full h-48 object-cover">
      <div class="p-4">
        <h2 class="text-xl font-semibold mb-2">Funghi</h2>
        <p class="text-gray-600 mb-4">Paradicsomszósz, mozzarella, friss gomba.</p>
        <div class="flex justify-between items-center">
          <span class="text-red-700 font-bold text-lg">1 700 Ft</span>
          <button class="bg-red-700 text-white px-3 py-1 rounded hover:bg-red-800 transition">
            Rendelés
          </button>
        </div>
      </div>
    </div>

    <!-- Többi pizza feltöltése majd -->

  </div>
</main>
