<nav style="background: linear-gradient(135deg, #ac1010 0%, #8a0c0c 100%);" 
     class="navbar navbar-dark navbar-expand-xl shadow-lg">
  <div class="container">
    
    <!-- Logo -->
    <a class="navbar-brand d-flex align-items-center" 
       ui-sref="home">
      <img src="./media/image/pizza_logo.png" 
           alt="PizzaParadise Logo" 
           style="height: 50px; width: auto; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));" 
           class="me-2">
      <span class="fw-bold text-uppercase" 
            style="letter-spacing: 1.5px; font-size: 1.4rem; 
                   text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">
        PizzaParadise
      </span>
    </a>

    <!-- Hamburger menü gomb -->
    <button class="navbar-toggler border-0 shadow-none" 
            type="button" 
            data-bs-toggle="collapse" 
            data-bs-target="#navbarNavDropdown"     
            aria-controls="navbarNavDropdown" 
            aria-expanded="false" 
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <!-- Navbar Linkek -->
    <div class="collapse navbar-collapse justify-content-end" id="navbarNavDropdown">
      <a class="nav-link text-uppercase fw-bold position-relative" 
         ui-sref="products()"
         ng-click="selectCategory(x.tagName)" 
         ui-sref-active="active">
      </a>

      <ul class="navbar-nav align-items-center">
        
        <!-- Bejelentkezett felhasználó -->
        <li ng-hide="$root.user_pizzaParadise != null" 
            class="nav-item dropdown">
          <a class="nav-link d-flex align-items-center user-dropdown " 
             href="#" 
             role="button" 
             data-bs-toggle="dropdown" 
             aria-expanded="false">
            <i class="fa-solid fa-circle-user me-2"></i>
            <span class="fw-semibold"></span>
            {{full_name}}
            <i class="fa-solid fa-chevron-down ms-2"></i>
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0">
            <li>
              <a class="dropdown-item d-flex align-items-center py-2"
                 ui-sref="settings">
                <i class="fa-solid fa-gear me-3"></i>
                Beállítások
              </a>
            </li>
            <li ng-hide="user_pizzaParadise.role != 'admin'">
              <a class="dropdown-item d-flex align-items-center py-2"
                 ui-sref="adminpage">
                <i class="fa-solid fa-user-tie me-3"></i>
                ADMIN felület
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item d-flex align-items-center py-2 logout-item" 
                 ng-click="logOut()">
                <i class="fa-solid fa-right-from-bracket me-3"></i>
                Kijelentkezés
              </a>
            </li>
          </ul>
        </li>

        <!-- Vendég menü -->
        <li ng-hide="$root.user_pizzaParadise == null" 
            class="nav-item d-flex gap-2">
          <a class="nav-link btn btn-outline-light rounded-pill px-4 py-2 
                    text-uppercase fw-semibold guest-btn"
             ui-sref="register">
            <i class="fas fa-user-plus me-2"></i> 
            Regisztráció
          </a>

          <a class="nav-link btn btn-outline-light rounded-pill px-4 py-2 
                    text-uppercase fw-semibold guest-btn"
             ui-sref="login">
            <i class="fas fa-sign-in-alt me-2"></i> 
            Bejelentkezés
          </a>
        </li>

        <!-- Kosár ikon -->
        <li class="nav-item ms-2"
            ng-show="$toHide !== false">
          <a class="nav-link position-relative d-flex align-items-center
                    justify-content-center rounded-circle cart-icon"
             ng-click="shoppingCart(null)"
             ui-sref="cart">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="position-absolute top-0 start-100 translate-middle
                         badge rounded-pill bg-warning text-dark cart-badge"
                  ng-show="cartItemCount > 0">
              {{cartItemCount}}
            </span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
