<style>
	body {
		background-image: url('./media/image/pizza_bg.jpg');
	}
</style>
<div class="container my-5">
	<div class="row justify-content-center">
		<div class="col-11 col-md-8 col-lg-6">

			<!-- Title -->
			<div class="text-center mb-4">
				<h3 class="text-danger fw-bold">
					<i class="fas fa-sign-in-alt me-2"></i> Bejelentkezés
				</h3>
				<p class="text-white-50 fw-bold">Lépj be, hogy hozzáférj a fiókodhoz</p>
			</div>

			<!-- Card for the form -->
			<div class="card shadow border-0">
				<div class="card-body p-4">
					<form name="loginForm"
						  novalidate>
						
						<!-- Email -->
						<div class="mb-3">
							<label for="login-email"
										 class="form-label text-danger fw-semibold">
								<i class="fas fa-envelope me-2"></i>Email cím .:
							</label>

							<input 	type="text"
									class="form-control border-danger" 
									ng-model="model.email"
									id="login-email" 
									name="email"
									placeholder="Email cím" 
									spellcheck="false" 
									autocomplete="off" 
									required maxlength="50"
									ng-pattern="/^([a-z0-9_.+-])+@(([a-z0-9-])+\.)+([a-z0-9]{2,4})+$/">

							<div class="form-text text-muted fw-bold">
								Kérjük, adja meg az email címét.
							</div>
						</div>

						<!-- Password -->
						<div class="mb-3">
							<label for="login-password"
										 class="form-label text-danger fw-semibold">
								<i class="fas fa-lock me-2"></i>Jelszó .:
							</label>

							<div class="input-group">
								<input type="{{model.showPassword ? 'text' : 'password'}}" 
											 class="form-control border-danger"
											 id="login-password" 
											 name="password" 
											 placeholder="Jelszó" 
											 spellcheck="false" 
											 autocomplete="off"
											 required minlength="6" 
											 maxlength="20" 
											 ng-init="model.password=null" 
											 ng-model="model.password"
											 ng-pattern="/^(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,20}$/">

								<button class="btn btn-outline-danger"
												type="button"
												ng-click="model.showPassword = !model.showPassword">
									<i class="{{model.showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'}}"></i>
								</button>
							</div>

							<div class="form-text text-muted fw-bold">
								Jelszavad legalább 6 karakter hosszú legyen.
							</div>
							
						</div>

						<!-- Login Button -->
						<div class="d-grid">
							<button type="submit" 
									class="btn btn-danger btn-lg shadow-sm" 	
									ng-click="loginBtn()"
									ng-disabled="loginForm.$invalid">
									Bejelentkezés
							</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>

<!-- Modal -->
<div class="modal fade" 
	 id="loginModal" 
	 tabindex="-1" 
	 aria-labelledby="loginModalLabel" 
	 aria-hidden="true">
	<div class="modal-dialog">
	  	<div class="modal-content">
			<div ng-class="user.userID !== 0 ? 'modal-header-green' : 'modal-header-red'" 
					 class="modal-header">

			  <h1 class="modal-title fs-5" 
						ng-if="user.userID !== 0"
			  	  id="loginModalLabel">Sikeres bejelentkezés!</h1>

				<h1 class="modal-title fs-5" 
				ng-if="user.userID === 0"
			  id="loginModalLabel">Sikertelen bejelentkezés!</h1>
			  <button type="button" 
			  		  class="btn-close" 
					  data-bs-dismiss="modal" 
					  aria-label="Close">
			  </button>
			</div>
			<div class="modal-footer">
			  <button type="button" 
								class="btn btn-secondary" 
								data-bs-dismiss="modal">
								Bezárás
				</button>
			</div>
	  </div>
	</div>
  </div>
