<style>
    body {
        background-image: url('./media/image/pizza_bg.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        position: relative;
    }
    
    body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(5px);
        z-index: 0;
    }
    
    .container {
        position: relative;
        z-index: 1;
    }
</style>

<div class="container py-3">
    <div class="row justify-content-center align-items-center">
        <div class="col-11 col-md-8 col-lg-5 col-xl-4">

            <!-- Login Card - KOMPAKT -->
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden"
                 style="background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px);">
                
                <!-- Card Header - Kisebb -->
                <div class="card-header bg-transparent border-0 pt-3 pb-0 text-center">
                    <div class="login-icon-wrapper mx-auto mb-2" style="width: 60px; height: 60px;">
                        <i class="fas fa-pizza-slice" style="font-size: 2rem;"></i>
                    </div>
                    <h2 class="h3 fw-bold text-dark mb-1">Üdv újra!</h2>
                    <p class="text-secondary small mb-0">Jelentkezz be a folytatáshoz</p>
                </div>

                <!-- Card Body - Sűrűbb padding -->
                <div class="card-body p-3 p-lg-4">
                    <form name="loginForm" novalidate>

                        <!-- Email Field - KOMPAKT -->
                        <div class="form-floating mb-2 position-relative">
                            <input type="email" 
                                   class="form-control form-control-sm border-0 border-bottom rounded-0 px-0" 
                                   id="login-email" 
                                   name="email"
                                   ng-model="model.email" 
                                   placeholder="Email cím"
                                   spellcheck="false" 
                                   autocomplete="off" 
                                   maxlength="50"
                                   ng-pattern="/^([a-z0-9_.+-])+@(([a-z0-9-])+\.)+([a-z0-9]{2,4})+$/" 
                                   required
                                   style="background: transparent; box-shadow: none; height: 45px;">
                            <label for="login-email" class="px-0 text-secondary small">
                                <i class="fas fa-envelope me-1 text-danger" style="font-size: 0.9rem;"></i>Email cím
                            </label>
                            <div class="invalid-feedback d-block small" 
                                 ng-show="loginForm.email.$touched && loginForm.email.$invalid">
                                <i class="fas fa-exclamation-circle me-1"></i>
                                Érvénytelen email!
                            </div>
                            <div class="form-line"></div>
                        </div>

                        <!-- Password Field - KOMPAKT -->
                        <div class="form-floating mb-2 position-relative">
                            <input type="{{model.showPassword ? 'text' : 'password'}}" 
                                   class="form-control form-control-sm border-0 border-bottom rounded-0 px-0" 
                                   id="login-password" 
                                   name="password" 	
                                   placeholder="Jelszó"
                                   spellcheck="false" 
                                   autocomplete="off"
                                   minlength="6" 
                                   maxlength="20" 
                                   ng-init="model.password=null" 
                                   ng-model="model.password"
                                   ng-pattern="/^(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,20}$/" 
                                   required
                                   style="background: transparent; box-shadow: none; height: 45px; padding-right: 35px !important;">
                            <label for="login-password" class="px-0 text-secondary small">
                                <i class="fas fa-lock me-1 text-danger" style="font-size: 0.9rem;"></i>Jelszó
                            </label>
                            <button class="btn btn-link position-absolute end-0 top-0 border-0" 
                                    type="button"
                                    ng-click="model.showPassword = !model.showPassword"
                                    style="color: #ac1010; text-decoration: none; z-index: 10; padding: 0; height: 45px; width: 35px;">
                                <i class="{{model.showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'}}" style="font-size: 0.9rem;"></i>
                            </button>
                            <div class="invalid-feedback d-block small" 
                                 ng-show="loginForm.password.$touched && loginForm.password.$invalid">
                                6+ kar, szám, kis/nagybetű
                            </div>
                            <div class="form-line"></div>
                        </div>

                        <!-- Remember Me & Forgot Password - KOMPAKT -->
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <input type="checkbox" 
                                       class="form-check-input" 
                                       id="rememberMe"
                                       style="border-color: #ac1010; cursor: pointer; margin-top: 3px;"
                                       ng-model="model.rememberMe">
                                <label class="form-check-label small text-secondary" for="rememberMe">
                                    Emlékezz rám
                                </label>
                            </div>
                            <a href="#" class="text-danger text-decoration-none fw-semibold small"
                               ui-sref="forgot-password">
                                Elfelejtett jelszó?
                            </a>
                        </div>

                        <!-- Login Button - KOMPAKT -->
                        <div class="d-grid gap-2">
                            <button type="button" 
                                    class="btn btn-login rounded-pill py-2" 
                                    ng-click="loginBtn()"
                                    ng-disabled="loginForm.$invalid"
                                    style="font-size: 0.95rem;">
                                <span class="d-flex align-items-center justify-content-center">
                                    <i class="fas fa-sign-in-alt me-2"></i>
                                    Bejelentkezés
                                </span>
                            </button>

                            <!-- Registration Link - KOMPAKT -->
                            <div class="text-center mt-2">
                                <p class="text-secondary small mb-0">
                                    Nincs még fiókod? 
                                    <a href="#" class="text-danger fw-bold text-decoration-none"
                                       ui-sref="register">
                                        Regisztráció <i class="fas fa-arrow-right ms-1" style="font-size: 0.8rem;"></i>
                                    </a>
                                </p>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modern Modal - változatlan, de kisebb padding opcionálisan -->
<div class="modal fade" 
     id="loginModal" 
     tabindex="-1" 
     aria-labelledby="loginModalLabel" 
     aria-hidden="true"
     data-bs-backdrop="static"
     data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow-lg">
            <div class="modal-body text-center p-4">
                <!-- Success State -->
                <div ng-if="user.userID !== 0" class="py-2">
                    <div class="success-animation mb-3">
                        <div class="checkmark-circle" style="width: 60px; height: 60px;">
                            <div class="checkmark" style="width: 20px; height: 40px; border-right: 4px solid white; border-bottom: 4px solid white;"></div>
                        </div>
                    </div>
                    <h3 class="h5 fw-bold text-dark mb-2">Sikeres bejelentkezés!</h3>
                    <p class="text-secondary small mb-3">Üdv újra, {{user.Name}}!</p>
                    <button type="button" 
                            class="btn btn-success px-4 rounded-pill py-2 small"
                            data-bs-dismiss="modal"
                            ui-sref="home">
                        Folytatás <i class="fas fa-arrow-right ms-1"></i>
                    </button>
                </div>

                <!-- Error State -->
                <div ng-if="user.userID === 0" class="py-2">
                    <div class="error-animation mb-3">
                        <div class="error-circle" style="width: 60px; height: 60px;">
                            <span class="error-mark" style="font-size: 2.5rem;">!</span>
                        </div>
                    </div>
                    <h3 class="h5 fw-bold text-dark mb-2">Sikertelen bejelentkezés!</h3>
                    <p class="text-secondary small mb-3">Hibás email cím vagy jelszó!</p>
                    <button type="button" 
                            class="btn btn-danger px-4 rounded-pill py-2 small"
                            data-bs-dismiss="modal">
                        Újrapróbálom <i class="fas fa-redo ms-1"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
