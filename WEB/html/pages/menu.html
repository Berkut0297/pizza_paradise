<div class="container my-4">
	<div class="row justify-content-center">
		<div class="col-md-6 col-lg-4 col-xl-3 mb-4"
				 ng-repeat="x in pizzas">
			<div class="card shadow-lg rounded-4 
                  border-0 h-100 overflow-hidden 
                  transition-transform transform-hover">
				  
				<!-- Képek -->
				<img ng-src="./media/image/pizza_photo/{{x.image_url}}"
						 class="card-img-top" 
						 alt="{{x.name}}"
						 style="height: 200px; object-fit: cover; border-bottom: 5px solid #28a745;">

				<!-- Kép body -->
				<div class="card-body text-center p-4">
					<h5 class="card-title text-success mb-3">{{x.name}}</h5>
					<p class="card-text fw-light text-muted"
						 style="font-size: 14px;">
						<strong>Ár .:</strong>
						{{x.price}} Ft
					</p>
				</div>

				<!-- Lábjegyzet -->
				<div class="card-footer bg-transparent border-0 p-3 d-flex justify-content-center">
					<button class="btn btn-outline-primary 
												 rounded-pill px-4 
												 py-2"
									data-bs-toggle="modal" 
									data-bs-target="#pizzaModalbuy"
									ng-click="buypizza(x)">
						<i class="fa fa-cart-plus me-2"></i> 
						Vásárlás
					</button>
				</div>
			</div>
		</div>
	</div>
</div>

<!--vásárlás Modal -->
<div class="modal fade"
		 id="pizzaModalbuy" 
		 tabindex="-1" 
		 aria-labelledby="pizzaModalLabel" 
		 aria-hidden="true">
	<div class="modal-dialog modal-dialog-centered">
		<div class="modal-content">
			<div class="modal-header modal-header-green">
				<h5 class="modal-title"
						id="pizzaModalLabel">{{pizzasModal.name}}</h5>
				<button type="button"
								class="btn-close" 
								data-bs-dismiss="modal" 
								aria-label="Close">
				</button>
			</div>
			
			
			<div class="modal-body">
				<!-- pizza adat -->
				<img ng-src="./media/image/pizza_photo/{{pizzasModal.image_url}}"
						 class="img-fluid rounded-3" 
						 alt="{{pizzasModal.name}}">
				<p class="mt-3">{{pizzasModal.description}}</p>
				 <p><strong>Ár .:</strong> {{pizzasModal.price}} Ft</p>


				<div class="d-flex justify-content-center align-items-center gap-3 mt-3">
					<!-- plusz -->
					<button type="button"
									class="btn btn-outline-secondary rounded-circle"
									ng-click="decreaseQty()"
									ng-disabled="quantity <= 1">
						-
					</button>
					<span class="fs-5 fw-bold">{{quantity}}</span>
					<!-- minusz -->
					<button type="button"
									class="btn btn-outline-secondary rounded-circle"
									ng-click="increaseQty()">
						+
					</button>
				</div>
				<!-- összesen -->
				<p class="text-center mt-2">
					<strong>Összesen:</strong>
					{{total * quantity}} Ft
				</p>

				<!-- extra feltetek -->
				<h6 class="text-center">Extra feltétek</h6>
				<div class="form-check"
						 ng-repeat="x in toppings">
					<input class="form-check-input"
								 type="checkbox"
								 ng-model="x.selected"
								 ng-change="getTotalPrice(x)">
					<label class="form-check-label">
						{{x.name}} (+{{x.price}} Ft)
					</label>
				</div>
			</div>

			<!-- gombok -->
			<div class="modal-footer">
				<button type="button"
								class="btn btn-outline-danger rounded-pill" 
								data-bs-dismiss="modal">
								Bezárás
				</button>
				<button type="button"
								class="btn btn-outline-success rounded-pill"
								ng-click="shoppingCart(pizzasModal)"
								ng-show="!$scope.canBuy">
								Vásárlás
				</button>
			</div>
		</div>
	</div>
</div>
