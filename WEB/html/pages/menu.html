<main class="container py-5">

  <h1 class="text-center text-danger fw-bold mb-5" style="letter-spacing: 2px; font-size: 2rem;">
    🍕 Menü
  </h1>

  <div class="row g-4">

    <!-- 🔥 PIZZA KÁRTYA -->
    <div class="col-12 col-sm-6 col-md-4">
      <div class="card shadow-sm border-0 h-100 rounded-4 
                  transition" style="transition: 0.3s ease;">

        <div class="position-relative">
          <img src="./media/image/margherita_pizza.jpg" 
               class="card-img-top" style="height: 210px; object-fit: cover;" alt="Margherita">

          <!-- Ár badge -->
          <span class="badge bg-danger position-absolute top-0 end-0 m-3 p-2 shadow">
            2 500 Ft
          </span>

          <!-- Overlay hover -->
          <div class="position-absolute top-0 start-0 w-100 h-100" 
               style="background: rgba(0,0,0,0); transition: 0.3s;"
               onmouseover="this.style.background='rgba(0,0,0,0.1)';"
               onmouseout="this.style.background='rgba(0,0,0,0)';">
          </div>
        </div>

        <div class="card-body">
          <h5 class="card-title fw-semibold">Margherita</h5>
          <p class="card-text text-muted">
            Paradicsomszósz, mozzarella sajt, friss bazsalikom.
          </p>

          <button class="btn btn-danger w-100 d-flex justify-content-center align-items-center gap-2">
            <i class="fas fa-pizza-slice"></i>
            Rendelés
          </button>
        </div>

      </div>
    </div>

    <!-- Pepperoni -->
    <div class="col-12 col-sm-6 col-md-4">
      <div class="card shadow-sm border-0 h-100 rounded-4">

        <div class="position-relative">
          <img src="./media/image/pepperoni_pizza.webp" 
               class="card-img-top" style="height: 210px; object-fit: cover;" alt="Pepperoni">

          <span class="badge bg-danger position-absolute top-0 end-0 m-3 p-2 shadow">
            3 800 Ft
          </span>

          <div class="position-absolute top-0 start-0 w-100 h-100" 
               style="background: rgba(0,0,0,0); transition: 0.3s;"
               onmouseover="this.style.background='rgba(0,0,0,0.1)';"
               onmouseout="this.style.background='rgba(0,0,0,0)';">
          </div>
        </div>

        <div class="card-body">
          <h5 class="card-title fw-semibold">Pepperoni</h5>
          <p class="card-text text-muted">
            Paradicsomszósz, mozzarella, pepperoni szeletek.
          </p>

          <button class="btn btn-danger w-100 d-flex justify-content-center align-items-center gap-2">
            <i class="fas fa-pizza-slice"></i>
            Rendelés
          </button>
        </div>

      </div>
    </div>

    <div class="col-12 col-sm-6 col-md-4">
      <div class="card shadow-sm border-0 h-100 rounded-4">

        <div class="position-relative">
          <img src="./media/image/vegetarian_pizza.jpg" 
               class="card-img-top" style="height: 210px; object-fit: cover;" alt="Funghi">

          <span class="badge bg-danger position-absolute top-0 end-0 m-3 p-2 shadow">
            3 700 Ft
          </span>

          <div class="position-absolute top-0 start-0 w-100 h-100" 
               style="background: rgba(0,0,0,0); transition: 0.3s;"
               onmouseover="this.style.background='rgba(0,0,0,0.1)';"
               onmouseout="this.style.background='rgba(0,0,0,0)';">
          </div>
        </div>

        <div class="card-body">
          <h5 class="card-title fw-semibold">Funghi</h5>
          <p class="card-text text-muted">
            Paradicsomszósz, mozzarella, friss gomba.
          </p>

          <button class="btn btn-danger w-100 d-flex justify-content-center align-items-center gap-2">
            <i class="fas fa-pizza-slice"></i>
            Rendelés
          </button>
        </div>

      </div>
    </div>

  </div>
</main>
