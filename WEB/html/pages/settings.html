<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6 col-xl-5">

            <!-- Settings Card -->
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden bg-white">
                
                <!-- Card Header -->
                <div class="card-header bg-transparent border-0 pt-4 pb-0 px-4">
                    <div class="d-flex align-items-center gap-3">
                        <!-- Ikon wrapper -->
                        <div class="bg-danger bg-gradient rounded-3 d-flex align-items-center justify-content-center"
                             style="width: 50px; height: 50px; box-shadow: 0 5px 15px rgba(172,16,16,0.2);">
                            <i class="fas fa-user-cog text-white fs-4"></i>
                        </div>
                        <div>
                            <h2 class="h4 fw-bold text-dark mb-0">Felhasználói Beállítások</h2>
                            <p class="text-secondary small mb-0">Profiladatok módosítása</p>
                        </div>
                    </div>
                </div>

                <!-- Card Body -->
                <div class="card-body p-4">
                    <form name="settingsForm" novalidate>

                        <!-- Felhasználónév -->
                        <div class="form-floating mb-3">
                            <input type="text" 
                                   class="form-control border-0 border-bottom rounded-0 px-0 shadow-none" 
                                   id="settings-username" 
                                   placeholder="Felhasználónév"
                                   ng-model="updateUser.updateUsername" 
                                   required
                                   style="background: transparent; height: 50px;">
                            <label for="settings-username" class="px-0 text-secondary">
                                <i class="fas fa-user me-2 text-danger"></i>Felhasználónév
                            </label>
                        </div>

                        <!-- Jelszó -->
                        <div class="form-floating mb-3">
                            <input type="password" 
                                   class="form-control border-0 border-bottom rounded-0 px-0 shadow-none" 
                                   id="settings-password" 
                                   placeholder="Jelszó"
                                   ng-model="updateUser.password"
                                   style="background: transparent; height: 50px;">
                            <label for="settings-password" class="px-0 text-secondary">
                                <i class="fas fa-lock me-2 text-danger"></i>Új jelszó (opcionális)
                            </label>
                        </div>

                        <!-- Email -->
                        <div class="form-floating mb-3">
                            <input type="email" 
                                   class="form-control border-0 border-bottom rounded-0 px-0 shadow-none" 
                                   id="settings-email" 
                                   placeholder="Email cím"
                                   ng-model="updateUser.email" 
                                   required
                                   style="background: transparent; height: 50px;">
                            <label for="settings-email" class="px-0 text-secondary">
                                <i class="fas fa-envelope me-2 text-danger"></i>Email cím
                            </label>
                        </div>

                        <!-- Teljes név -->
                        <div class="form-floating mb-3">
                            <input type="text" 
                                   class="form-control border-0 border-bottom rounded-0 px-0 shadow-none" 
                                   id="settings-fullname" 
                                   placeholder="Teljes név"
                                   ng-model="updateUser.full_name"
                                   style="background: transparent; height: 50px;">
                            <label for="settings-fullname" class="px-0 text-secondary">
                                <i class="fas fa-id-card me-2 text-danger"></i>Teljes név
                            </label>
                        </div>

                        <!-- Telefonszám -->
                        <div class="form-floating mb-4">
                            <input type="tel" 
                                   class="form-control border-0 border-bottom rounded-0 px-0 shadow-none" 
                                   id="settings-phone" 
                                   placeholder="Telefonszám"
                                   ng-model="updateUser.phone"
                                   style="background: transparent; height: 50px;">
                            <label for="settings-phone" class="px-0 text-secondary">
                                <i class="fas fa-phone-alt me-2 text-danger"></i>Telefonszám
                            </label>
                        </div>

                        <!-- Mentés gomb -->
                        <div class="d-grid gap-2">
                            <button type="button" 
                                    class="btn btn-danger rounded-pill py-3 fw-semibold shadow-sm bg-gradient" 
                                    ng-click="userDataUpdate()"
                                    ng-disabled="settingsForm.$invalid">
                                <i class="fas fa-save me-2"></i>
                                Változtatások mentése
                            </button>
                            
                            <!-- Vissza a főoldalra -->
                            <div class="text-center mt-2">
                                <a href="#" class="text-danger text-decoration-none small" ui-sref="home">
                                    <i class="fas fa-arrow-left me-1"></i>Vissza a főoldalra
                                </a>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Card Footer -->
                <div class="card-footer bg-transparent border-0 pb-4 px-4">
                    <div class="alert alert-warning bg-warning bg-opacity-10 border-0 rounded-3 p-3 mb-0">
                        <div class="d-flex">
                            <i class="fas fa-exclamation-triangle text-warning me-3 mt-1"></i>
                            <div class="small text-secondary">
                                <span class="fw-bold d-block mb-1">Fontos!</span>
                                A jelszó módosításához add meg az új jelszót. Ha nem szeretnéd módosítani, hagyd üresen.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .bg-gradient.bg-danger {
        background: linear-gradient(135deg, #ac1010, #d43b3b) !important;
    }
    
    .form-floating > .form-control:focus {
        border-bottom: 2px solid #ac1010 !important;
    }
    
    .btn-danger:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    
    .btn-danger:not(:disabled):hover {
        background: linear-gradient(135deg, #8a0c0c, #6a0a0a) !important;
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(172, 16, 16, 0.3) !important;
    }
    
    @media (max-width: 768px) {
        .bg-danger.rounded-3 {
            width: 40px !important;
            height: 40px !important;
        }
        .bg-danger.rounded-3 i {
            font-size: 1.2rem !important;
        }
    }
</style>
